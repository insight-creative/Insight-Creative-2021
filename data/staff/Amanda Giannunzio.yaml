name: Amanda Giannunzio
first_name: Amanda
job_title: Web Developer
bio: >-
  Meet Amanda, Insight’s resident cat whisperer, bookworm and radical empath. 


  As a web developer, Amanda builds and maintains websites with an emphasis on content strategy and organization. She understands both the technical and human sides of the web, helping clients turn ideas into functional, digital experiences.
communication_with_substance_block: 
  enabled: true
  body: Amanda embodies communication with substance through careful listening to understand what clients really want. While clients may have a goal, they don’t always “speak website.” Amanda excels at uncovering hidden assumptions before work begins and explaining technical challenges in ways that make sense.
history_block: 
  heading: How she got here
  body: >-
    Amanda’s journey into web development began early, coding in middle and high school during the Neopets and MySpace era. She attended the University of Wisconsin–Stevens Point as a history major before pivoting to web development at Northeast Wisconsin Technical College, where she earned her associate degree in 2016. 
    

    She spent nearly eight years as a web developer at a Green Bay marketing agency before taking a break at the end of 2024 to pursue freelance work. During that time, she stepped into a remote webmaster role for Tivnu, based in Portland, Oregon, while also supporting friends’ small business websites. 
    

    Alongside her web work, Amanda is a part-time co-manager at Safe Haven Pet Sanctuary, where she wears many hats. Her earlier career experience includes caregiving, retail and customer service and logistics, backgrounds that continue to shape her empathy and client-first mindset. 
quote:
  body: Joining an established community of professionals who trust and support each other to make meaningful change through our work.
fun_fact: 
  enabled: true
  body: Amanda is a competitive puzzler who regularly competes with a team of friends and has proudly claimed second place. She’s also an avid reader who has read 136 books over the past nine years, including 24 or more each year for the last three years. Her book collection surpasses 570 titles.
marketing_tip:
  body: Finding and sticking with your authentic voice will help you more than anything else. It’s how you build trust and connection with your audience, gaining a follower, not just a consumer.
