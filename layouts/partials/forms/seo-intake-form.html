<form method="post" name="seo-intake" data-netlify="true" netlify-honeypot="bot-field" action="/seo-intake/thank-you/">
    <div hidden>
        <label>
            Don't fill this out if you're human:
            <input name="bot-field" aria-label="bot-field" />
        </label>
    </div>
    <div class="visually-hidden">
        <label for="subject">New SEO intake form submission from insightcreative.com</label>
        <input aria-label="subject" name="subject" value="New SEO intake form submission from insightcreative.com" />
    </div>
    <div class="contact-form__form-group">
        <label for="no_private_customer_details">
            <input id="no_private_customer_details" name="no_private_customer_details" type="checkbox" required>
            I confirm I won't include private customer details.*
        </label>
    </div>
    <h3 class="no-margin">Business basics</h3>
    <div class="contact-form__form-group">
        <label for="brand_name">Brand name (public-facing)*</label>
        <input id="brand_name" name="brand_name" type="text" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="legal_name">Legal business name (if different)</label>
        <input id="legal_name" name="legal_name" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="website_url">Website URL*</label>
        <input id="website_url" name="website_url" type="url" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="primary_phone">Primary phone number*</label>
        <input id="primary_phone" name="primary_phone" type="tel" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="business_address">Primary business address (if applicable) <span>(If you're service-area only, you can skip.)</span></label>
        <textarea id="business_address" name="business_address" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="service_areas">Primary locations or service areas* <span>(Cities, counties, regions. One per line is great.)</span></label>
        <textarea id="service_areas" name="service_areas" class="contact-form__form-control" required></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="do_not_serve">Areas you do not serve (if any)</label>
        <textarea id="do_not_serve" name="do_not_serve" class="contact-form__form-control"></textarea>
    </div>
    <h3 class="no-margin">What you do</h3>
    <div class="contact-form__form-group">
        <label for="service_1">Core service #1*</label>
        <input id="service_1" name="service_1" type="text" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="service_2">Core service #2</label>
        <input id="service_2" name="service_2" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="service_3">Core service #3</label>
        <input id="service_3" name="service_3" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="service_4">Core service #4</label>
        <input id="service_4" name="service_4" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="service_5">Core service #5</label>
        <input id="service_5" name="service_5" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="priority_services">Which 2–3 services do you want to sell more of?* <span>(List 2–3. If you listed services above, you can copy/paste them.)</span></label>
        <textarea id="priority_services" name="priority_services" class="contact-form__form-control" required></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="do_not_offer">What do you NOT do? (important) <span>(Services you don't offer, jobs you won't take, etc.)</span></label>
        <textarea id="do_not_offer" name="do_not_offer" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="ideal_customer">Ideal customer (1–3 sentences)*</label>
        <textarea id="ideal_customer" name="ideal_customer" class="contact-form__form-control" required></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="not_ideal_customer">Not a good fit customer (who you don't want)</label>
        <textarea id="not_ideal_customer" name="not_ideal_customer" class="contact-form__form-control"></textarea>
    </div>
    <h3 class="no-margin">Trust and proof</h3>
    <div class="contact-form__form-group">
        <label for="differentiators">Why should someone choose you over competitors? (3–5 bullets)* <span>(Paste as bullets or one per line.)</span></label>
        <textarea id="differentiators" name="differentiators" class="contact-form__form-control" required></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="licenses_certs">Licenses, certifications, memberships</label>
        <textarea id="licenses_certs" name="licenses_certs" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="awards">Awards or recognitions</label>
        <textarea id="awards" name="awards" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="years_in_business">Years in business*</label>
        <input id="years_in_business" name="years_in_business" type="number" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="origin_story">Origin story (optional)</label>
        <textarea id="origin_story" name="origin_story" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="mentionable_results">Results/outcomes you're allowed to mention (only if accurate and verifiable) <span>(If you can't verify it, leave it blank.)</span></label>
        <textarea id="mentionable_results" name="mentionable_results" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="google_reviews_link">Google reviews link <span>(Navigate to your GBP and click Ask For Reviews)</span></label>
        <input id="google_reviews_link" name="google_reviews_link" type="url" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="other_review_links">Other review sites (optional)</label>
        <textarea id="other_review_links" name="other_review_links" class="contact-form__form-control"></textarea>
    </div>
    <h3 class="no-margin">Policies and constraints</h3>
    <div class="contact-form__form-group">
        <label for="guarantees">Guarantees (exact wording if possible)</label>
        <textarea id="guarantees" name="guarantees" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="customer_policies">Important customer policies <span>(Refunds, cancellations, warranties, emergency service, timelines, etc.)</span></label>
        <textarea id="customer_policies" name="customer_policies" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="avoid_saying">Anything we must avoid saying <span>(Restricted language, compliance constraints, promises you won't make, etc.)</span></label>
        <textarea id="avoid_saying" name="avoid_saying" class="contact-form__form-control"></textarea>
    </div>
    <h3 class="no-margin">Customer language</h3>
    <div class="contact-form__form-group">
        <label for="customer_phrases">Customer phrases (3–10) people use when asking for your services* <span>(One per line.)</span></label>
        <textarea id="customer_phrases" name="customer_phrases" class="contact-form__form-control" required></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="faq_1">Top question customers ask #1*</label>
        <input id="faq_1" name="faq_1" type="text" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="faq_2">Top question customers ask #2</label>
        <input id="faq_2" name="faq_2" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="faq_3">Top question customers ask #3</label>
        <input id="faq_3" name="faq_3" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="faq_4">Top question customers ask #4</label>
        <input id="faq_4" name="faq_4" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="faq_5">Top question customers ask #5</label>
        <input id="faq_5" name="faq_5" type="text" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="common_objections">Common objections you hear (3–5) <span>(One per line.)</span></label>
        <textarea id="common_objections" name="common_objections" class="contact-form__form-control"></textarea>
    </div>
    <h3 class="no-margin">Links and assets</h3>
    <div class="contact-form__form-group">
        <label for="gbp_link">Google Business Profile link <span>(Navigate to your GBP and click Share to copy your share URL)</span></label>
        <input id="gbp_link" name="gbp_link" type="url" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="social_links">Social profile links <span>(One per line is great.)</span></label>
        <textarea id="social_links" name="social_links" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="sales_deck_link">Sales deck / brochure / flyer link <span>(Please provide link to these assets on your website or provide a link to Google Drive, Dropbox or similar)</span></label>
        <input id="sales_deck_link" name="sales_deck_link" type="url" class="contact-form__form-control">
    </div>
    <div class="contact-form__form-group">
        <label for="case_study_links">Case study page links <span>(One per line is great.)</span></label>
        <textarea id="case_study_links" name="case_study_links" class="contact-form__form-control"></textarea>
    </div>
    <div class="contact-form__form-group">
        <label for="brand_guidelines_link">Brand guidelines link</label>
        <input id="brand_guidelines_link" name="brand_guidelines_link" type="url" class="contact-form__form-control">
    </div>
    <h3 class="no-margin">Approvals</h3>
    <div class="contact-form__form-group">
        <label for="approver_name">Who should review and approve the Fact Check Pack? (Name)*</label>
        <input id="approver_name" name="approver_name" type="text" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="approver_email">Approver email*</label>
        <input id="approver_email" name="approver_email" type="email" class="contact-form__form-control" required>
    </div>
    <div class="contact-form__form-group">
        <label for="anything_else">Anything else we should know?</label>
        <textarea id="anything_else" name="anything_else" class="contact-form__form-control"></textarea>
    </div>
    <button type="submit" class="contact-form__btn btn btn-primary">Submit</button>
</form>
